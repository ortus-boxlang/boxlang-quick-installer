name: BoxLang Quick Installers Release

on:
  # If you push to main this will trigger a stable release
  push:
    branches:
      - main
      - development

  workflow_dispatch:

# Cancel running builds if another push to branch is made while this build is running
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
  # if 'development' it's true, then it's a snapshot build
  SNAPSHOT: ${{ github.ref == 'refs/heads/development' }}

jobs:
  ##########################################################################################
  # Compile BoxLang scripts to native platform binaries via MatchBox
  ##########################################################################################
  compile:
    name: Compile – ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
            archive_ext: tar.gz
            matchbox_binary: matchbox-linux-x64
          - runner: macos-13
            target: macos-x64
            archive_ext: tar.gz
            matchbox_binary: matchbox-macos-x64
          - runner: macos-latest
            target: macos-arm64
            archive_ext: tar.gz
            matchbox_binary: matchbox-macos-arm64
          - runner: windows-latest
            target: windows-x64
            archive_ext: zip
            matchbox_binary: matchbox-windows-x64.exe

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download MatchBox
        shell: bash
        run: |
          MATCHBOX_URL="https://github.com/ortus-boxlang/matchbox/releases/latest/download/${{ matrix.matchbox_binary }}"
          echo "Downloading MatchBox from: $MATCHBOX_URL"
          curl -fsSL -o matchbox "$MATCHBOX_URL"
          chmod +x matchbox

      - name: Compile BoxLang scripts
        shell: bash
        run: |
          mkdir -p dist
          SCRIPTS=("bvm" "install-boxlang" "install-bx-module" "install-bx-site")
          for script in "${SCRIPTS[@]}"; do
            echo "Compiling src/${script}.bxs for ${{ matrix.target }}..."
            ./matchbox --target ${{ matrix.target }} src/${script}.bxs
            # Move/rename output binary into dist/
            if [ -f "${script}" ]; then
              mv "${script}" "dist/${script}"
            elif [ -f "${script}.exe" ]; then
              mv "${script}.exe" "dist/${script}.exe"
            else
              echo "ERROR: compiled binary not found for ${script}"
              exit 1
            fi
          done
          ls -la dist/

      - name: Package binaries (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          tar -czf boxlang-tools-${{ matrix.target }}.tar.gz -C dist .

      - name: Package binaries (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath boxlang-tools-${{ matrix.target }}.zip

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          name: boxlang-tools-${{ matrix.target }}
          path: boxlang-tools-${{ matrix.target }}.${{ matrix.archive_ext }}
          retention-days: 1

  ##########################################################################################
  # Build install-bvm bootstrap scripts + publish everything
  ##########################################################################################
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [compile]
    # add write permissions
    permissions:
      contents: write
      checks: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Version File
        id: version
        run: |
          INSTALLER_VERSION=$(jq -r '.INSTALLER_VERSION' version.json)
          echo "INSTALLER_VERSION=${INSTALLER_VERSION}" >> $GITHUB_ENV

      - name: Update changelog [unreleased] with latest version
        uses: thomaseizinger/keep-a-changelog-new-release@3.1.0
        # If NOT a env.snapshot
        if: env.SNAPSHOT == 'false'
        with:
          changelogPath: ./changelog.md
          tag: v${{ env.INSTALLER_VERSION }}

      - name: Fix Markdown on Changelog
        if: env.SNAPSHOT == 'false'
        run: |
          npm install -g markdownlint-cli
          markdownlint changelog.md --fix

      - name: Build bootstrap installer scripts
        run: |
          ./build.sh ${{ env.SNAPSHOT == 'true' && '--snapshot' || '' }}

      - name: Download all compiled platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: boxlang-tools-*
          path: build/binaries/

      - name: List build artifacts
        run: find build/ -type f | sort

      - name: Commit Changelog [unreleased] with latest version
        uses: EndBug/add-and-commit@v9.1.4
        if: env.SNAPSHOT == 'false'
        with:
          author_name: Github Actions
          author_email: lmajano@ortussolutions.com
          message: "Finalized changelog for v${{ env.INSTALLER_VERSION }}"
          add: changelog.md

      - name: Tag Version
        uses: rickstaa/action-create-tag@v1.7.2
        if: env.SNAPSHOT == 'false'
        with:
          tag: "v${{ env.INSTALLER_VERSION }}"
          force_push_tag: true
          message: "Latest Release v${{ env.INSTALLER_VERSION }}"

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/**
            changelog.md

      - name: Upload Bootstrap Scripts to S3
        uses: jakejarvis/s3-sync-action@master
        if: success()
        with:
          args: --acl public-read
        env:
          AWS_S3_BUCKET: "downloads.ortussolutions.com"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_SECRET }}
          SOURCE_DIR: "build/"
          DEST_DIR: ${{ env.SNAPSHOT == 'true' && 'ortussolutions/boxlang-quick-installer/snapshot/' || 'ortussolutions/boxlang-quick-installer' }}

      - name: Create GitHub Release with Platform Binaries
        uses: softprops/action-gh-release@v2
        if: env.SNAPSHOT == 'false'
        continue-on-error: true
        with:
          tag_name: v${{ env.INSTALLER_VERSION }}
          name: ${{ env.INSTALLER_VERSION }}
          body_path: changelog.md
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            build/binaries/boxlang-tools-linux-x64/boxlang-tools-linux-x64.tar.gz
            build/binaries/boxlang-tools-macos-x64/boxlang-tools-macos-x64.tar.gz
            build/binaries/boxlang-tools-macos-arm64/boxlang-tools-macos-arm64.tar.gz
            build/binaries/boxlang-tools-windows-x64/boxlang-tools-windows-x64.zip
            build/install-bvm.sh
            build/install-bvm.ps1
            build/install-bvm.bat

      - name: Inform Slack
        if: ${{ always() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: coding
          SLACK_COLOR: ${{ job.status }} # or a specific color like 'green' or '#ff00ff'
          SLACK_ICON_EMOJI: ":bell:"
          SLACK_MESSAGE: "BoxLang ${{ env.INSTALLER_VERSION }} Built with ${{ job.status }}!"
          SLACK_TITLE: "BoxLang Build"
          SLACK_USERNAME: CI
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

  ##########################################################################################
  # Prep Next Release
  ##########################################################################################
  prep_next_release:
    name: Prep Next Release
    if: github.ref != 'refs/heads/development'
    runs-on: ubuntu-latest
    needs: [publish]
    # add write permissions
    permissions:
      contents: write
      checks: write
    steps:
      - name: Checkout Development Repository
        uses: actions/checkout@v4
        with:
          ref: development

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .tmp

      - name: Copy Changelog
        run: |
          cp -vf .tmp/changelog.md changelog.md

      - name: Bump Version
        run: |
          ./bump.sh
          git pull

      - name: Commit
        uses: EndBug/add-and-commit@v9.1.4
        with:
          author_name: Github Actions
          author_email: info@ortussolutions.com
          message: "Version bump"
          add: |
            version.json
            changelog.md

  ##########################################################################################
  # Notify Homebrew Tap
  ##########################################################################################
  notify_homebrew:
    name: Notify Homebrew Tap
    if: github.ref != 'refs/heads/development'
    runs-on: ubuntu-latest
    needs: [publish]
    permissions: {}
    steps:
      - name: Dispatch Homebrew Tap Update
        run: |
          curl -fsSL -X POST https://api.github.com/repos/ortus-boxlang/homebrew-boxlang/actions/workflows/update-formulas.yml/dispatches \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GHA_WORKFLOW_DISPATCHER_PAT_BOXLANG }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{ "event_type":"installer-released" }'
