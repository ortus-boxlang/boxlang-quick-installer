name: BoxLang Quick Installers Release

on:
  # If you push to main this will trigger a stable release
  push:
    branches:
      - main
      - development

  workflow_dispatch:

# Cancel running builds if another push to branch is made while this build is running
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
  # if 'development' it's true, then it's a snapshot build
  SNAPSHOT: ${{ github.ref == 'refs/heads/development' }}

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # add write permissions
    permissions:
      contents: write
      checks: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Read Version File
        id: version
        run: |
          INSTALLER_VERSION=$(jq -r '.INSTALLER_VERSION' version.json)
          echo "INSTALLER_VERSION=${INSTALLER_VERSION}" >> $GITHUB_ENV
          echo "image_version=${IMAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Update changelog [unreleased] with latest version
        uses: thomaseizinger/keep-a-changelog-new-release@3.1.0
        # If NOT a env.snapshot
        if: env.SNAPSHOT == 'false'
        with:
          changelogPath: ./changelog.md
          tag: v${{ env.INSTALLER_VERSION }}

      - name: Fix Markdown on Changelog
        if: env.SNAPSHOT == 'false'
        run: |
          npm install -g markdownlint-cli
          markdownlint changelog.md --fix

      - name: Build the Installer
        run: |
          ./build.sh ${{ env.SNAPSHOT == 'true' && '--snapshot' || '' }}

      - name: Commit Changelog [unreleased] with latest version
        uses: EndBug/add-and-commit@v9.1.4
        if: env.SNAPSHOT == 'false'
        with:
          author_name: Github Actions
          author_email: lmajano@ortussolutions.com
          message: "Finalized changelog for v${{ env.INSTALLER_VERSION }}"
          add: changelog.md

      - name: Tag Version
        uses: rickstaa/action-create-tag@v1.7.2
        if: env.SNAPSHOT == 'false'
        with:
          tag: "v${{ env.INSTALLER_VERSION }}"
          force_push_tag: true
          message: "Latest Release v${{ env.INSTALLER_VERSION }}"

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: |
            build/**
            changelog.md

      - name: Upload Distributions to S3
        uses: jakejarvis/s3-sync-action@master
        if: success()
        with:
          args: --acl public-read
        env:
          AWS_S3_BUCKET: "downloads.ortussolutions.com"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_SECRET }}
          SOURCE_DIR: "build/"
          DEST_DIR: ${{ env.SNAPSHOT == 'true' && 'ortussolutions/boxlang-quick-installer/snapshot/' || 'ortussolutions/boxlang-quick-installer' }}

      - name: Create Github Release
        uses: taiki-e/create-gh-release-action@v1.9.2
        if: env.SNAPSHOT == 'false'
        continue-on-error: true
        id: create_release
        with:
          title: ${{ env.INSTALLER_VERSION }}
          changelog: changelog.md
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/v${{ env.INSTALLER_VERSION }}

      ##########################################################################################
      # Homebrew Tap Support
      # Uploads the installer zip as a versioned GitHub release asset so Homebrew formulas can
      # reference a stable, immutable download URL with a known sha256.
      ##########################################################################################

      - name: Upload Installer Zip to GitHub Release
        if: env.SNAPSHOT == 'false'
        continue-on-error: true
        run: |
          gh release upload "v${{ env.INSTALLER_VERSION }}" build/boxlang-installer.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Formulas
        if: env.SNAPSHOT == 'false'
        run: |
          SHA256=$(sha256sum build/boxlang-installer.zip | awk '{print $1}')
          VERSION="${{ env.INSTALLER_VERSION }}"
          echo "Updating Homebrew formulas: sha256=${SHA256} version=${VERSION}"

          for formula in homebrew/Formula/bvm.rb homebrew/Formula/boxlang.rb; do
            sed -i "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA256}\"/" "${formula}"
            sed -i "s/  version \"[0-9.]*\"/  version \"${VERSION}\"/" "${formula}"
            sed -i "s|/download/v[0-9.]*/boxlang-installer.zip|/download/v${VERSION}/boxlang-installer.zip|" "${formula}"
          done

      - name: Commit Updated Homebrew Formulas
        uses: EndBug/add-and-commit@v9.1.4
        if: env.SNAPSHOT == 'false'
        with:
          author_name: Github Actions
          author_email: info@ortussolutions.com
          message: "Update Homebrew formulas for v${{ env.INSTALLER_VERSION }}"
          add: |
            homebrew/Formula/bvm.rb
            homebrew/Formula/boxlang.rb

      - name: Push to Homebrew Tap
        if: env.SNAPSHOT == 'false'
        continue-on-error: true
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not configured — skipping tap push."
            echo "See homebrew/README.md for setup instructions."
            exit 0
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ortus-boxlang/homebrew-boxlang.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          cp homebrew/Formula/*.rb /tmp/homebrew-tap/Formula/
          cd /tmp/homebrew-tap
          git config user.email "info@ortussolutions.com"
          git config user.name "Github Actions"
          git add Formula/
          if git diff --cached --quiet; then
            echo "No formula changes to push."
          else
            git commit -m "Update formulas for v${{ env.INSTALLER_VERSION }}"
            git push
          fi
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Inform Slack
        if: ${{ always() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: coding
          SLACK_COLOR: ${{ job.status }} # or a specific color like 'green' or '#ff00ff'
          SLACK_ICON_EMOJI: ":bell:"
          SLACK_MESSAGE: "BoxLang ${{ env.INSTALLER_VERSION }} Built with ${{ job.status }}!"
          SLACK_TITLE: "BoxLang Build"
          SLACK_USERNAME: CI
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

  ##########################################################################################
  # Prep Next Release
  ##########################################################################################
  prep_next_release:
    name: Prep Next Release
    if: github.ref != 'refs/heads/development'
    runs-on: ubuntu-latest
    needs: [publish]
    # add write permissions
    permissions:
      contents: write
      checks: write
    steps:
      - name: Checkout Development Repository
        uses: actions/checkout@v6
        with:
          ref: development

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: .tmp

      - name: Copy Changelog
        run: |
          cp -vf .tmp/changelog.md changelog.md

      - name: Bump Version
        run: |
          ./bump.sh
          git pull

      - name: Commit
        uses: EndBug/add-and-commit@v9.1.4
        with:
          author_name: Github Actions
          author_email: info@ortussolutions.com
          message: "Version bump"
          add: |
            version.json
            changelog.md
